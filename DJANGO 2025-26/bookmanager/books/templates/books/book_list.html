{% extends "books/base.html" %}
{% block content %}
<h2>Book List</h2>
<a href="{% url 'create_book' %}">Add New Book</a>
<ul>
    {% for book in books %}
        <li>
            <a href="{% url 'book_detail' book.pk %}">{{ book.title }}</a>
            ({{ book.author.name }})
        </li>
    {% endfor %}
</ul>
{% endblock %}
